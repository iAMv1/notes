name: Convert Markdown to PDF

on:
  push:
    branches: [main]
    paths:
      - "notes/**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pdf-converter/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pdf-converter

      - name: Install Chromium dependencies
        run: npx puppeteer browsers install chrome
        working-directory: pdf-converter

      - name: Convert all Markdown files to PDF
        run: npm run convert:all -- ../notes
        working-directory: pdf-converter

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdf-notes
          path: notes/output/*.pdf
          retention-days: 90
