name: Convert Markdown to PDF

on:
  push:
    branches: [main]
    paths:
      - "notes/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pdf-converter/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pdf-converter

      - name: Install Chromium dependencies
        run: npx puppeteer browsers install chrome
        working-directory: pdf-converter

      - name: Convert all Markdown files to PDF
        run: npm run convert:all -- ../notes
        working-directory: pdf-converter

      - name: Upload PDFs
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pdf-notes
          path: notes/output/*.pdf
          retention-days: 90

      - name: Summary
        run: |
          echo "## 📄 PDF Conversion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated PDFs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for pdf in notes/output/*.pdf; do
            if [ -f "$pdf" ]; then
              name=$(basename "$pdf")
              size=$(du -h "$pdf" | cut -f1)
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the **pdf-notes** artifact from the **Artifacts** section at the top of this workflow run page." >> $GITHUB_STEP_SUMMARY
